# adampang's personal companiesmarketcap. Ranked by MARKET CAP, computed from
# the Be-Useful formula (Elon, Book of Elon p.33) plus the money term:
#
#   market cap  =  Transformation (t)  ×  Reach (r)  ×  Budget (b)
#
#   t  = 0-1, how much you change ONE person vs the best alternative (depth)
#   r  = reachable ICP humans (breadth)
#   b  = annual $ each ICP will actually pay (monetizability)
#   cap = t * r * b   (annual capturable value; a CEILING, not current revenue)
#
# `metric` is the honest FLOOR (what's real right now). `capLabel` is the ceiling.
# status: live | beta | building   (controls the pill color)

